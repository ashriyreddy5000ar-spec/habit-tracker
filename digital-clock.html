<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Digital Clock</title>\n    <style>\n        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }\n        .clock { font-size: 48px; margin: 20px; }\n        .timezone { font-size: 24px; }\n    </style>\n</head>\n<body>\n    <h1>Digital Clock</h1>\n    <div class="clock" id="clock"></div>\n    <script>\n        const timezones = [\n            { name: 'UTC', offset: 0 },\n            { name: 'EST', offset: -5 },\n            { name: 'CST', offset: -6 },\n            { name: 'MST', offset: -7 },\n            { name: 'PST', offset: -8 },\n            { name: 'GMT', offset: 0 },\n            { name: 'CET', offset: 1 },\n            { name: 'IST', offset: 5.5 }\n        ];\n        function updateClock() {\n            const now = new Date();\n            timezones.forEach(tz => {\n                const localTime = new Date(now.getTime() + (tz.offset * 60 * 60 * 1000));\n                document.getElementById('clock').innerHTML = `<div class='timezone'>${tz.name}: ${localTime.toUTCString().slice(17, 25)}</div>`;\n            });\n        }\n        setInterval(updateClock, 1000);\n        updateClock();\n    </script>\n</body>\n</html>
