<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F0F0F">
<title>My Habits · PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0F0F0F;--bg2:#1A1A1A;--bg3:#222222;--card:#181818;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#F0EDE8;--text2:#888580;--text3:#555250;
  --accent:#E8D5A3;--accent2:#C4A96B;
  --green:#4ADE80;--green-bg:rgba(74,222,128,0.08);--green-border:rgba(74,222,128,0.2);
  --red:#F87171;--red-bg:rgba(248,113,113,0.08);
  --blue:#60A5FA;--purple:#A78BFA;--amber:#FBBF24;
  --r:16px;--r-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:130px;}

/* HEADER */
.header{padding:52px 20px 16px;position:sticky;top:0;z-index:50;background:linear-gradient(to bottom,#0F0F0F 82%,transparent);}
.header-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;}
.header-left h1{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1;}
.header-left .sub{font-size:13px;color:var(--text2);margin-top:5px;font-style:italic;}
.date-chip{background:var(--bg3);border:1px solid var(--border2);border-radius:100px;padding:6px 12px;font-size:11px;font-weight:600;color:var(--text2);white-space:nowrap;margin-top:2px;}

/* USER SCORE HERO */
.score-hero{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden;}
.score-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;background:radial-gradient(circle,rgba(232,213,163,0.07) 0%,transparent 70%);pointer-events:none;}
.score-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.score-lbl{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);}
.score-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:100px;border:1px solid;}
.badge-elite{background:rgba(232,213,163,0.1);border-color:var(--accent2);color:var(--accent);}
.badge-pro{background:rgba(96,165,250,0.1);border-color:var(--blue);color:var(--blue);}
.badge-rising{background:rgba(167,139,250,0.1);border-color:var(--purple);color:var(--purple);}
.badge-starter{background:rgba(136,133,128,0.1);border-color:var(--text3);color:var(--text2);}
.score-main{display:flex;align-items:flex-end;gap:12px;}
.score-num{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;letter-spacing:-2px;line-height:1;}
.score-num span{font-size:20px;color:var(--text3);font-weight:600;margin-left:2px;}
.score-r{flex:1;padding-bottom:4px;}
.score-trend{font-size:11px;color:var(--text2);margin-bottom:6px;}
.sbar-bg{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.sbar-fill{height:100%;border-radius:2px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1);}
.score-meta{display:flex;gap:0;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.smeta{flex:1;text-align:center;}
.smeta-val{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;}
.smeta-key{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px;}

/* PROGRESS CARD */
.progress-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:center;}
.ring-container{position:relative;width:72px;height:72px;}
.ring-container svg{transform:rotate(-90deg);width:72px;height:72px;}
.ring-track{fill:none;stroke:var(--bg3);stroke-width:5;}
.ring-prog{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;stroke-dasharray:201;stroke-dashoffset:201;transition:stroke-dashoffset 0.7s cubic-bezier(0.4,0,0.2,1),stroke 0.4s;}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
.ring-pct{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;line-height:1;}
.ring-lbl{font-size:9px;color:var(--text3);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;}
.prog-status{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:4px;}
.prog-detail{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.5;}
.mini-bg{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.mini-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);width:0%;}
.streak-bar{display:flex;gap:6px;margin-top:8px;}
.sdot{flex:1;height:3px;border-radius:2px;background:var(--bg3);transition:background 0.3s;}
.sdot.on{background:var(--accent);}

/* SECTION */
.section{padding:0 20px;margin-top:24px;}
.sec-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.sec-title{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);}
.count-pill{font-size:10px;font-weight:700;background:var(--bg3);color:var(--text2);padding:3px 9px;border-radius:100px;border:1px solid var(--border);}

/* INSIGHTS */
.insights-grid{display:flex;flex-direction:column;gap:8px;}
.ins-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;display:flex;align-items:flex-start;gap:10px;}
.ins-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.ins-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:2px 7px;border-radius:100px;margin-bottom:4px;}
.tag-good{background:rgba(74,222,128,0.1);color:var(--green);}
.tag-warn{background:rgba(251,191,36,0.1);color:var(--amber);}
.tag-info{background:rgba(96,165,250,0.1);color:var(--blue);}
.ins-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.4;}
.ins-sub{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.4;}

/* HABIT SCORES */
.hscore-list{display:flex;flex-direction:column;gap:8px;}
.hscore-row{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;}
.hscore-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.hscore-l{display:flex;align-items:center;gap:8px;}
.hscore-em{font-size:15px;}
.hscore-name{font-size:13px;font-weight:500;color:var(--text);}
.hscore-meta{font-size:10px;color:var(--text3);margin-top:1px;}
.hscore-val{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
.hbar-bg{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.hbar-fill{height:100%;border-radius:2px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1);}
.cat-chip{font-size:9px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;padding:2px 6px;border-radius:4px;display:inline-block;}
.c-health{background:rgba(74,222,128,0.1);color:#4ADE80;}
.c-mind{background:rgba(167,139,250,0.1);color:#A78BFA;}
.c-productivity{background:rgba(96,165,250,0.1);color:#60A5FA;}
.c-finance{background:rgba(251,191,36,0.1);color:#FBBF24;}
.c-custom{background:rgba(136,133,128,0.1);color:#888580;}

/* CAT GRID */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;}
.cat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.cat-name{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;}
.cat-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text);}
.cat-bar-bg{height:2px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:8px;}
.cat-bar-fill{height:100%;border-radius:2px;transition:width 0.8s;}

/* CHART */
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 14px 10px;}
.chart-c{position:relative;width:100%;height:140px;margin-top:4px;}
#monthChart{display:block;}
.chart-legend{display:flex;gap:16px;margin-top:10px;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);}
.leg-dot{width:8px;height:8px;border-radius:50%;}

/* HABIT CARDS */
.habits-list{display:flex;flex-direction:column;gap:8px;}
.habit-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;transition:background 0.2s,border-color 0.2s,transform 0.15s;position:relative;overflow:hidden;animation:slideIn 0.3s cubic-bezier(0.4,0,0.2,1) both;}
@keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.habit-card:active{transform:scale(0.98);}
.habit-card.done{background:var(--green-bg);border-color:var(--green-border);}
.em-wrap{width:38px;height:38px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:background 0.2s;}
.habit-card.done .em-wrap{background:rgba(74,222,128,0.12);}
.h-body{flex:1;min-width:0;}
.h-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color 0.2s;}
.habit-card.done .h-name{color:var(--text3);text-decoration:line-through;text-decoration-color:var(--text3);}
.h-sub{font-size:11px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:5px;}
.habit-card.done .h-sub{color:var(--green);}
.check-c{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s cubic-bezier(0.4,0,0.2,1);}
.habit-card.done .check-c{background:var(--green);border-color:var(--green);}
.check-c svg{width:12px;height:12px;stroke:var(--bg);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:0;transform:scale(0.4);transition:all 0.2s cubic-bezier(0.4,0,0.2,1);}
.habit-card.done .check-c svg{opacity:1;transform:scale(1);}
.del-btn{width:26px;height:26px;border-radius:50%;border:none;background:var(--red-bg);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;opacity:0;transition:opacity 0.2s,transform 0.15s;padding:0;}
.habit-card:hover .del-btn,.habit-card:focus-within .del-btn{opacity:1;}
.del-btn:active{transform:scale(0.88);}
.del-btn svg{width:10px;height:10px;stroke:var(--red);stroke-width:2.5;stroke-linecap:round;}

/* EMPTY */
.empty{text-align:center;padding:52px 20px;border:1px dashed var(--border2);border-radius:var(--r);background:var(--card);}
.empty-icon{font-size:40px;margin-bottom:12px;display:block;}
.empty-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--text2);line-height:1.6;}

/* FORM */
.add-section{padding:0 20px;margin-top:10px;}
.add-form{background:var(--card);border:1px solid var(--accent2);border-radius:var(--r);padding:16px;margin-bottom:10px;display:none;flex-direction:column;gap:12px;animation:formIn 0.2s cubic-bezier(0.4,0,0.2,1);box-shadow:0 8px 32px rgba(0,0,0,0.4);}
@keyframes formIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.add-form.open{display:flex;}
.ep-row{display:flex;flex-wrap:wrap;gap:6px;}
.ep-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.ep-btn:active{transform:scale(0.88);}
.ep-btn.sel{border-color:var(--accent2);background:rgba(196,169,107,0.12);}
.n-input,.c-sel{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 14px;font-family:'Instrument Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color 0.2s;}
.n-input{width:100%;}
.c-sel{width:100%;appearance:none;cursor:pointer;}
.n-input:focus,.c-sel:focus{border-color:var(--accent2);}
.n-input::placeholder{color:var(--text3);}
.c-sel option{background:#222;}
.form-btns{display:flex;gap:8px;}
.btn-cancel{flex:1;padding:11px;border-radius:var(--r-sm);border:1px solid var(--border2);background:transparent;font-family:'Instrument Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;}
.btn-cancel:active{background:var(--bg3);}
.btn-save{flex:2;padding:11px;border-radius:var(--r-sm);border:none;background:var(--accent);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#0F0F0F;cursor:pointer;transition:opacity 0.15s,transform 0.15s;}
.btn-save:active{opacity:0.85;transform:scale(0.98);}

/* FAB */
.fab-wrap{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:390px;z-index:100;}
.fab{width:100%;padding:15px;border-radius:100px;border:none;background:var(--accent);color:#0F0F0F;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:0.3px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;box-shadow:0 4px 24px rgba(232,213,163,0.2);transition:opacity 0.2s,transform 0.15s;}
.fab:active{opacity:0.88;transform:scale(0.98);}
.fab-plus{width:20px;height:20px;background:rgba(15,15,15,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);}
.fab.open .fab-plus{transform:rotate(45deg);}

/* SPARKS */
.spark{position:fixed;pointer-events:none;font-size:20px;z-index:9999;animation:spark 0.75s cubic-bezier(0.4,0,0.2,1) forwards;}
@keyframes spark{0%{opacity:1;transform:scale(0.5) translateY(0);}60%{opacity:1;transform:scale(1.3) translateY(-50px);}100%{opacity:0;transform:scale(0.8) translateY(-90px);}}
::-webkit-scrollbar{width:0;}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-row">
      <div class="header-left">
        <h1 id="greeting">Good morning</h1>
        <div class="sub" id="motiveLine">Build the life you want.</div>
      </div>
      <div class="date-chip" id="datechip"></div>
    </div>

    <!-- USER SCORE -->
    <div class="score-hero">
      <div class="score-top">
        <div class="score-lbl">Your Score</div>
        <div class="score-badge badge-starter" id="scoreBadge">Starter</div>
      </div>
      <div class="score-main">
        <div class="score-num" id="scoreNum">0<span>/100</span></div>
        <div class="score-r">
          <div class="score-trend" id="scoreTrend">Complete habits to build your score</div>
          <div class="sbar-bg"><div class="sbar-fill" id="sbarFill" style="width:0%;background:var(--accent2);"></div></div>
        </div>
      </div>
      <div class="score-meta">
        <div class="smeta"><div class="smeta-val" id="metaStreak">0</div><div class="smeta-key">Best Streak</div></div>
        <div class="smeta"><div class="smeta-val" id="metaDays">0</div><div class="smeta-key">Days Tracked</div></div>
        <div class="smeta"><div class="smeta-val" id="metaRate">0%</div><div class="smeta-key">Completion</div></div>
      </div>
    </div>
  </div>

  <!-- TODAY -->
  <div class="section" style="margin-top:20px;">
    <div class="progress-card">
      <div class="ring-container">
        <svg viewBox="0 0 72 72">
          <circle class="ring-track" cx="36" cy="36" r="32"/>
          <circle class="ring-prog" id="ringProg" cx="36" cy="36" r="32"/>
        </svg>
        <div class="ring-center">
          <div class="ring-pct" id="ringPct">0%</div>
          <div class="ring-lbl">done</div>
        </div>
      </div>
      <div>
        <div class="prog-status" id="progStatus">Let's begin 🌅</div>
        <div class="prog-detail" id="progDetail">0 of 14 habits done</div>
        <div class="mini-bg"><div class="mini-fill" id="miniBar"></div></div>
        <div class="streak-bar" id="streakBar"></div>
      </div>
    </div>
  </div>

  <!-- HABITS -->
  <div class="section">
    <div class="sec-hd">
      <div class="sec-title">Today's Habits</div>
      <div class="count-pill" id="countPill">14</div>
    </div>
    <div class="habits-list" id="habitList"></div>
  </div>

  <!-- INSIGHTS -->
  <div class="section">
    <div class="sec-hd">
      <div class="sec-title">Performance Insights</div>
      <div class="count-pill" id="insCount">0</div>
    </div>
    <div class="insights-grid" id="insightsGrid"></div>
  </div>

  <!-- HABIT SCORES -->
  <div class="section">
    <div class="sec-hd"><div class="sec-title">Habit Scores</div></div>
    <div class="hscore-list" id="hscoreList"></div>
  </div>

  <!-- CATEGORY -->
  <div class="section">
    <div class="sec-hd"><div class="sec-title">By Category</div></div>
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <!-- MONTHLY CHART -->
  <div class="section">
    <div class="sec-hd"><div class="sec-title">Monthly Trend</div></div>
    <div class="chart-wrap">
      <div class="chart-c" id="chartWrap">
        <canvas id="monthChart"></canvas>
      </div>
      <div class="chart-legend">
        <div class="leg-item"><div class="leg-dot" style="background:#E8D5A3"></div>Daily Score</div>
        <div class="leg-item"><div class="leg-dot" style="background:#60A5FA"></div>Completion %</div>
      </div>
    </div>
  </div>

  <!-- ADD FORM -->
  <div class="add-section">
    <div class="add-form" id="addForm">
      <div class="ep-row" id="emojiPicker"></div>
      <input class="n-input" id="nameInput" type="text" placeholder="Name your new habit…" maxlength="42"/>
      <select class="c-sel" id="catSelect">
        <option value="health">Health</option>
        <option value="mind">Mind</option>
        <option value="productivity">Productivity</option>
        <option value="finance">Finance</option>
        <option value="custom">Custom</option>
      </select>
      <div class="form-btns">
        <button class="btn-cancel" id="cancelBtn">Cancel</button>
        <button class="btn-save" id="saveBtn">Add Habit</button>
      </div>
    </div>
  </div>
</div>

<div class="fab-wrap">
  <button class="fab" id="fab">
    <span class="fab-plus">+</span>Add New Habit
  </button>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────
const EMOJIS=['✍️','👟','💤','🧘','⏰','✨','🏋️','🏢','💧','💸','📖','📵','🚫','🤸','🎯','🥗','💪','🎨','🎸','🌿','☀️','🚿'];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const CAT_COLOR={health:'#4ADE80',mind:'#A78BFA',productivity:'#60A5FA',finance:'#FBBF24',custom:'#888580'};
const CAT_LBL={health:'Health',mind:'Mind',productivity:'Productivity',finance:'Finance',custom:'Custom'};
const MOTIVES=['Build the life you want, one habit at a time.','Small steps lead to big changes.','Consistency beats perfection.','You are what you repeatedly do.','Progress, not perfection.'];
const SK='habitpro_v4';

// ── DEFAULT HABITS ──────────────────────────────────────────
const DEF=[
  {id:1,emoji:'✍️',name:'Journal',cat:'mind'},
  {id:2,emoji:'👟',name:'Running',cat:'health'},
  {id:3,emoji:'💤',name:'8 hrs of sleep',cat:'health'},
  {id:4,emoji:'🧘',name:'Meditation',cat:'mind'},
  {id:5,emoji:'⏰',name:'Wake up early',cat:'productivity'},
  {id:6,emoji:'✨',name:'Skincare',cat:'health'},
  {id:7,emoji:'🏋️',name:'Gym workout',cat:'health'},
  {id:8,emoji:'🏢',name:'Office work',cat:'productivity'},
  {id:9,emoji:'💧',name:'Drink 3L water',cat:'health'},
  {id:10,emoji:'💸',name:'Track expenses',cat:'finance'},
  {id:11,emoji:'📖',name:'Read 10 pages',cat:'mind'},
  {id:12,emoji:'📵',name:'Limit screen time',cat:'productivity'},
  {id:13,emoji:'🚫',name:'No snooze',cat:'productivity'},
  {id:14,emoji:'🤸',name:'Stretching',cat:'health'},
];

// ── STATE ──────────────────────────────────────────────────
function makeHabit(d){return{id:d.id,emoji:d.emoji,name:d.name,cat:d.cat||'custom',streak:0,bestStreak:0,history:{}};}
function loadState(){
  try{
    const r=localStorage.getItem(SK);
    if(r){const s=JSON.parse(r);s.habits=(s.habits||[]).map(h=>({streak:0,bestStreak:0,history:{},cat:'custom',...h}));return s;}
  }catch(e){}
  return{habits:DEF.map(makeHabit),dh:{}};
}
let S=loadState();
let nid=Math.max(...S.habits.map(h=>h.id),14)+1;
let formOpen=false,selEmoji=EMOJIS[0],selCat='health';
const $=id=>document.getElementById(id);
const C=2*Math.PI*32;

// ── DATE HELPERS ───────────────────────────────────────────
function dk(ago=0){const d=new Date();d.setDate(d.getDate()-ago);return d.toISOString().slice(0,10);}
const today=()=>dk(0);
const k7=()=>Array.from({length:7},(_,i)=>dk(6-i));
const k30=()=>Array.from({length:30},(_,i)=>dk(29-i));

// ── SCORING ────────────────────────────────────────────────
function habitScore(h){
  const all=Object.keys(h.history);
  if(!all.length)return 0;
  const cons=k7().filter(k=>h.history[k]).length/7;
  const cr=all.filter(k=>h.history[k]).length/all.length;
  const ss=h.bestStreak?h.streak/h.bestStreak:(h.streak>0?1:0);
  return Math.min(100,Math.round((cons*0.4+cr*0.3+ss*0.3)*100));
}
function dayScore(k){
  const t=S.habits.length;if(!t)return 0;
  return Math.round(S.habits.filter(h=>h.history[k]).length/t*100);
}
function userScore(){
  const d7=k7().map(k=>dayScore(k));
  const avg7=d7.reduce((a,b)=>a+b,0)/7;
  const ha=S.habits.length?S.habits.reduce((a,h)=>a+habitScore(h),0)/S.habits.length:0;
  return Math.min(100,Math.round(avg7*0.5+ha*0.5));
}
function bestStreakAll(){return S.habits.reduce((m,h)=>Math.max(m,h.bestStreak,h.streak),0);}
function daysTracked(){const ks=new Set();S.habits.forEach(h=>Object.keys(h.history).forEach(k=>ks.add(k)));return ks.size;}
function overallRate(){let t=0,d=0;S.habits.forEach(h=>{const ks=Object.keys(h.history);t+=ks.length;d+=ks.filter(k=>h.history[k]).length;});return t?Math.round(d/t*100):0;}

// ── STREAKS ────────────────────────────────────────────────
function recalcStreak(h){
  let s=0;const td=today();
  let d=new Date();
  while(true){
    const k=d.toISOString().slice(0,10);
    if(h.history[k]){s++;d.setDate(d.getDate()-1);}
    else if(k===td){d.setDate(d.getDate()-1);break;}
    else break;
  }
  if(h.history[td]){
    let s2=0;const d2=new Date();
    while(true){const k=d2.toISOString().slice(0,10);if(h.history[k]){s2++;d2.setDate(d2.getDate()-1);}else break;}
    h.streak=s2;
  }else h.streak=s;
  h.bestStreak=Math.max(h.bestStreak||0,h.streak);
}
function save(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}

// ── TOGGLE ─────────────────────────────────────────────────
function toggle(id,card){
  const h=S.habits.find(x=>x.id===id);if(!h)return;
  const td=today(),was=!!h.history[td];
  h.history[td]=!was;
  recalcStreak(h);
  if(!S.dh)S.dh={};
  S.dh[td]={percent:dayScore(td),score:dayScore(td)};
  save();
  const done=!was;
  card.classList.toggle('done',done);
  const sub=card.querySelector('.h-sub');
  sub.innerHTML=done?`Completed ✓ ${h.streak>1?`<span>🔥${h.streak}</span>`:''}`:`Tap to complete ${h.streak>1?`<span>🔥${h.streak}</span>`:''}`;
  if(done)sparks(card);
  updateAll();
}

// ── RENDER HABITS ──────────────────────────────────────────
function renderHabits(){
  const list=$('habitList'),td=today();
  if(!S.habits.length){
    list.innerHTML=`<div class="empty"><span class="empty-icon">🚀</span><div class="empty-title">Start building your habits</div><div class="empty-sub">Tap the button below to add<br>your first habit for today</div></div>`;
    return;
  }
  list.innerHTML='';
  S.habits.forEach((h,i)=>{
    const done=!!h.history[td];
    const card=document.createElement('div');
    card.className='habit-card'+(done?' done':'');
    card.style.animationDelay=(i*25)+'ms';
    const fl=h.streak>1?`<span>🔥${h.streak}</span>`:'';
    card.innerHTML=`
      <div class="em-wrap">${h.emoji}</div>
      <div class="h-body">
        <div class="h-name">${h.name}</div>
        <div class="h-sub">${done?`Completed ✓ ${fl}`:`Tap to complete ${fl}`}</div>
      </div>
      <div class="check-c"><svg viewBox="0 0 12 12" fill="none"><polyline points="1.5,6 4.5,9.5 10.5,2.5"/></svg></div>
      <button class="del-btn" tabindex="-1"><svg viewBox="0 0 10 10" fill="none"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg></button>`;
    card.addEventListener('click',e=>{if(e.target.closest('.del-btn'))return;toggle(h.id,card);});
    card.querySelector('.del-btn').addEventListener('click',e=>{e.stopPropagation();remove(h.id,card);});
    list.appendChild(card);
  });
}

// ── PROGRESS ───────────────────────────────────────────────
function updateProgress(){
  const td=today(),done=S.habits.filter(h=>!!h.history[td]).length,total=S.habits.length;
  const p=total?Math.round(done/total*100):0;
  $('ringProg').style.strokeDashoffset=C-(p/100)*C;
  $('ringProg').style.strokeDasharray=C;
  $('ringPct').textContent=p+'%';
  $('miniBar').style.width=p+'%';
  $('countPill').textContent=total;
  $('ringProg').style.stroke=p===100?'#4ADE80':p>=50?'#86EFAC':'#E8D5A3';
  let st,det;
  if(!total){st='No habits yet 👀';det='Add your first habit below';}
  else if(p===0){st="Let's begin 🌅";det=`0 of ${total} habits done`;}
  else if(p<30){st='Getting started 🔥';det=`${done} of ${total} done · keep going`;}
  else if(p<60){st='Good momentum 💪';det=`${done} of ${total} done · halfway there`;}
  else if(p<100){st='Almost there! ⚡';det=`${done} of ${total} done · finish strong`;}
  else{st='Perfect day! 🎉';det='All habits completed!';}
  $('progStatus').textContent=st;$('progDetail').textContent=det;
  const sb=$('streakBar');sb.innerHTML='';
  S.habits.slice(0,14).forEach(h=>{const d=document.createElement('div');d.className='sdot'+(h.history[td]?' on':'');sb.appendChild(d);});
}

// ── USER SCORE ─────────────────────────────────────────────
function updateUserScore(){
  const sc=userScore();
  $('scoreNum').innerHTML=`${sc}<span>/100</span>`;
  $('sbarFill').style.width=sc+'%';
  let tier,bc,tr;
  if(sc>=80){tier='Elite';bc='badge-elite';tr='Outstanding performance · top tier';}
  else if(sc>=60){tier='Pro';bc='badge-pro';tr='Strong consistency · keep pushing';}
  else if(sc>=35){tier='Rising';bc='badge-rising';tr='Building momentum · stay consistent';}
  else{tier='Starter';bc='badge-starter';tr='Complete habits to grow your score';}
  const badge=$('scoreBadge');badge.textContent=tier;badge.className=`score-badge ${bc}`;
  $('sbarFill').style.background=sc>=80?'#4ADE80':sc>=60?'#60A5FA':sc>=35?'#A78BFA':'#C4A96B';
  $('scoreTrend').textContent=tr;
  $('metaStreak').textContent=bestStreakAll();
  $('metaDays').textContent=daysTracked();
  $('metaRate').textContent=overallRate()+'%';
}

// ── HABIT SCORES ───────────────────────────────────────────
function renderHabitScores(){
  const list=$('hscoreList');list.innerHTML='';
  S.habits.map(h=>({h,s:habitScore(h)})).sort((a,b)=>b.s-a.s).forEach(({h,s})=>{
    const col=s>=70?'#4ADE80':s>=40?'#FBBF24':'#F87171';
    const days=Object.keys(h.history).filter(k=>h.history[k]).length;
    const row=document.createElement('div');row.className='hscore-row';
    row.innerHTML=`
      <div class="hscore-top">
        <div class="hscore-l">
          <span class="hscore-em">${h.emoji}</span>
          <div>
            <div class="hscore-name">${h.name}</div>
            <div class="hscore-meta">${days}d done · 🔥${h.streak} streak <span class="cat-chip c-${h.cat}">${CAT_LBL[h.cat]||'Custom'}</span></div>
          </div>
        </div>
        <div class="hscore-val" style="color:${col}">${s}</div>
      </div>
      <div class="hbar-bg"><div class="hbar-fill" style="width:0%;background:${col}" data-t="${s}"></div></div>`;
    list.appendChild(row);
  });
  requestAnimationFrame(()=>list.querySelectorAll('.hbar-fill').forEach(el=>el.style.width=el.dataset.t+'%'));
}

// ── CATEGORY ───────────────────────────────────────────────
function renderCats(){
  const grid=$('catGrid');grid.innerHTML='';
  const cats={};const td=today();
  S.habits.forEach(h=>{const c=h.cat||'custom';if(!cats[c])cats[c]={t:0,d:0};cats[c].t++;if(h.history[td])cats[c].d++;});
  Object.entries(cats).forEach(([c,{t,d}])=>{
    const p=t?Math.round(d/t*100):0,col=CAT_COLOR[c]||'#888';
    const card=document.createElement('div');card.className='cat-card';
    card.innerHTML=`<div class="cat-top"><div class="cat-name">${CAT_LBL[c]||c}</div><span class="cat-chip c-${c}">${t}</span></div><div class="cat-val">${p}%</div><div class="cat-bar-bg"><div class="cat-bar-fill" style="width:0%;background:${col}" data-t="${p}"></div></div>`;
    grid.appendChild(card);
  });
  requestAnimationFrame(()=>grid.querySelectorAll('.cat-bar-fill').forEach(el=>el.style.width=el.dataset.t+'%'));
}

// ── INSIGHTS ───────────────────────────────────────────────
function renderInsights(){
  const ins=[];const td=today();
  const dayA=Array(7).fill(null).map(()=>({t:0,d:0}));
  S.habits.forEach(h=>Object.entries(h.history).forEach(([k,v])=>{const dw=new Date(k).getDay();dayA[dw].t++;if(v)dayA[dw].d++;}));
  const dPcts=dayA.map(d=>d.t?Math.round(d.d/d.t*100):null);
  const valid=dPcts.map((p,i)=>({p,i})).filter(x=>x.p!==null);
  if(valid.length>=2){
    const best=valid.reduce((a,b)=>b.p>a.p?b:a);
    const worst=valid.reduce((a,b)=>b.p<a.p?b:a);
    if(best.p>40)ins.push({icon:'📈',tag:'good',title:`You perform best on ${DAYS[best.i]}s`,sub:`${best.p}% avg completion — your power day.`});
    if(worst.p<50&&worst.i!==best.i)ins.push({icon:'⚠️',tag:'warn',title:`${DAYS[worst.i]}s need attention`,sub:`Only ${worst.p}% avg — try reducing intensity.`});
  }
  const catSc={};
  S.habits.forEach(h=>{const c=h.cat||'custom';if(!catSc[c])catSc[c]=[];catSc[c].push(habitScore(h));});
  const catAvg=Object.entries(catSc).map(([c,arr])=>({c,avg:Math.round(arr.reduce((a,b)=>a+b,0)/arr.length)}));
  if(catAvg.length>=2){
    const top=catAvg.reduce((a,b)=>b.avg>a.avg?b:a);
    const low=catAvg.reduce((a,b)=>b.avg<a.avg?b:a);
    if(top.avg>20)ins.push({icon:'🏆',tag:'good',title:`${CAT_LBL[top.c]} is your strongest category`,sub:`Avg habit score ${top.avg} — keep it up!`});
    if(low.avg<top.avg&&catAvg.length>1)ins.push({icon:'🎯',tag:'info',title:`${CAT_LBL[low.c]} needs more focus`,sub:`Scoring ${low.avg} on avg — small wins add up.`});
  }
  const s7=k7().map(k=>dayScore(k));
  const rec=Math.round(s7.slice(4).reduce((a,b)=>a+b,0)/3);
  const old=Math.round(s7.slice(0,3).reduce((a,b)=>a+b,0)/3);
  if(rec>old+10)ins.push({icon:'🚀',tag:'good',title:'Momentum is building this week',sub:`Recent 3 days at ${rec}% vs earlier ${old}%`});
  else if(rec<old-10)ins.push({icon:'📉',tag:'warn',title:'Performance dipped recently',sub:`Last 3 days at ${rec}% vs earlier ${old}%`});
  const onFire=S.habits.filter(h=>h.streak>=3);
  if(onFire.length)ins.push({icon:'🔥',tag:'good',title:`${onFire.length} habit${onFire.length>1?'s':''} on a hot streak`,sub:onFire.map(h=>h.name).join(', ')});
  const todayDone=S.habits.filter(h=>h.history[td]).length;
  if(todayDone===S.habits.length&&S.habits.length>0)ins.push({icon:'🎉',tag:'good',title:'Perfect day achieved!',sub:'All habits completed today. Legendary.'});
  if(!ins.length)ins.push({icon:'💡',tag:'info',title:'Start tracking to unlock insights',sub:'Complete habits over several days for personalised analytics.'});
  const grid=$('insightsGrid');grid.innerHTML='';$('insCount').textContent=ins.length;
  ins.forEach(x=>{
    const c=document.createElement('div');c.className='ins-card';
    c.innerHTML=`<div class="ins-icon">${x.icon}</div><div><span class="ins-tag tag-${x.tag}">${x.tag.toUpperCase()}</span><div class="ins-title">${x.title}</div><div class="ins-sub">${x.sub}</div></div>`;
    grid.appendChild(c);
  });
}

// ── CHART ──────────────────────────────────────────────────
let chartRAF=null;
function renderChart(){
  const canvas=$('monthChart');if(!canvas)return;
  const wrap=canvas.parentElement;
  const W=wrap.offsetWidth,H=wrap.offsetHeight;
  if(!W||!H)return;
  const dpr=devicePixelRatio||1;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const P={t:10,r:10,b:24,l:28},cW=W-P.l-P.r,cH=H-P.t-P.b;
  const keys=k30();
  const scores=keys.map(k=>dayScore(k));
  const pcts=keys.map(k=>{const t=S.habits.length;if(!t)return 0;return Math.round(S.habits.filter(h=>h.history[k]).length/t*100);});
  const xOf=i=>P.l+(i/(keys.length-1))*cW;
  const yOf=v=>P.t+cH-(v/100)*cH;
  function grid(){
    [0,25,50,75,100].forEach(v=>{
      ctx.beginPath();ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=0.5;
      ctx.moveTo(P.l,yOf(v));ctx.lineTo(W-P.r,yOf(v));ctx.stroke();
      ctx.fillStyle='rgba(136,133,128,0.6)';ctx.font='9px sans-serif';ctx.textAlign='right';
      ctx.fillText(v,P.l-4,yOf(v)+3);
    });
    keys.forEach((k,i)=>{if(i%5!==0)return;ctx.fillStyle='rgba(136,133,128,0.6)';ctx.textAlign='center';ctx.font='9px sans-serif';ctx.fillText(k.slice(8),xOf(i),H-4);});
  }
  function line(data,color,prog){
    const n=Math.max(2,Math.ceil(data.length*prog));
    ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.lineJoin='round';
    data.slice(0,n).forEach((v,i)=>i===0?ctx.moveTo(xOf(i),yOf(v)):ctx.lineTo(xOf(i),yOf(v)));
    ctx.stroke();
    ctx.beginPath();data.slice(0,n).forEach((v,i)=>i===0?ctx.moveTo(xOf(i),yOf(v)):ctx.lineTo(xOf(i),yOf(v)));
    ctx.lineTo(xOf(n-1),yOf(0));ctx.lineTo(xOf(0),yOf(0));ctx.closePath();
    ctx.fillStyle=color+'15';ctx.fill();
  }
  let prog=0;if(chartRAF)cancelAnimationFrame(chartRAF);
  (function frame(){ctx.clearRect(0,0,W,H);grid();line(scores,'#E8D5A3',prog);line(pcts,'#60A5FA',prog);if(prog<1){prog=Math.min(1,prog+0.04);chartRAF=requestAnimationFrame(frame);}})();
}

// ── REMOVE / ADD ───────────────────────────────────────────
function remove(id,card){
  card.style.transition='opacity 0.18s,transform 0.18s';card.style.opacity='0';card.style.transform='translateX(24px)';
  setTimeout(()=>{S.habits=S.habits.filter(x=>x.id!==id);save();renderAll();},180);
}
function addHabit(){
  const name=$('nameInput').value.trim();
  if(!name){$('nameInput').style.borderColor='#F87171';$('nameInput').focus();setTimeout(()=>$('nameInput').style.borderColor='',700);return;}
  S.habits.push({id:nid++,emoji:selEmoji,name,cat:selCat,streak:0,bestStreak:0,history:{}});
  save();closeForm();renderAll();
}

// ── FORM ───────────────────────────────────────────────────
function buildPicker(){
  const p=$('emojiPicker');p.innerHTML='';
  EMOJIS.forEach(em=>{
    const b=document.createElement('button');b.className='ep-btn'+(em===selEmoji?' sel':'');b.textContent=em;b.type='button';
    b.addEventListener('click',()=>{selEmoji=em;p.querySelectorAll('.ep-btn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');});
    p.appendChild(b);
  });
}
function openForm(){formOpen=true;$('addForm').classList.add('open');$('fab').classList.add('open');buildPicker();setTimeout(()=>{$('nameInput').focus();$('addForm').scrollIntoView({behavior:'smooth',block:'nearest'});},80);}
function closeForm(){formOpen=false;$('addForm').classList.remove('open');$('fab').classList.remove('open');$('nameInput').value='';selEmoji=EMOJIS[0];selCat='health';$('catSelect').value='health';}

// ── SPARKS ─────────────────────────────────────────────────
function sparks(el){
  const r=el.getBoundingClientRect();
  ['✨','⭐','🌟','💫','✅'].forEach((em,i)=>{
    const s=document.createElement('div');s.className='spark';s.textContent=em;
    s.style.left=(r.left+r.width*(0.2+i*0.15))+'px';s.style.top=r.top+'px';
    s.style.animationDelay=(i*60)+'ms';document.body.appendChild(s);setTimeout(()=>s.remove(),900+i*60);
  });
}

// ── RENDER ALL ─────────────────────────────────────────────
function updateAll(){updateProgress();updateUserScore();renderHabitScores();renderCats();renderInsights();renderChart();}
function renderAll(){renderHabits();updateAll();}

// ── EVENTS ─────────────────────────────────────────────────
$('fab').addEventListener('click',()=>formOpen?closeForm():openForm());
$('cancelBtn').addEventListener('click',closeForm);
$('saveBtn').addEventListener('click',addHabit);
$('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')addHabit();if(e.key==='Escape')closeForm();});
$('catSelect').addEventListener('change',e=>selCat=e.target.value);
window.addEventListener('resize',renderChart);

// ── INIT ───────────────────────────────────────────────────
const h=new Date().getHours();
$('greeting').textContent=h<12?'Good morning':h<17?'Good afternoon':'Good evening';
$('datechip').textContent=new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
$('motiveLine').textContent=MOTIVES[new Date().getDay()%MOTIVES.length];
S.habits.forEach(recalcStreak);save();
renderAll();
</script>
